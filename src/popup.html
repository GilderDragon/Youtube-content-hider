<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0f0f0f;
      color: #f1f1f1;
      margin: 0;
      padding: 15px;
    }
    h3 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 16px;
      font-weight: 600;
    }
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
    }
    input {
      flex: 1;
      background-color: #212121;
      border: 1px solid #3d3d3d;
      border-radius: 4px;
      color: #fff;
      padding: 8px 12px;
      font-size: 14px;
      outline: none;
    }
    input:focus {
      border-color: #3ea6ff;
    }
    button {
      background-color: #3ea6ff;
      color: #0f0f0f;
      border: none;
      border-radius: 4px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background-color: #65b8ff;
    }
    .keyword-list {
      max-height: 180px;
      overflow-y: auto;
      border: 1px solid #2d2d2d;
      border-radius: 4px;
      padding: 5px;
      background-color: #1a1a1a;
    }
    .keyword-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      background-color: #272727;
      border-radius: 4px;
      margin-bottom: 5px;
      font-size: 13px;
    }
    .keyword-item:last-child {
      margin-bottom: 0;
    }
    .delete-btn {
      background: none;
      color: #ff4d4d;
      border: none;
      cursor: pointer;
      padding: 0 4px;
      font-size: 14px;
    }
    .delete-btn:hover {
      color: #ff8080;
    }
    .empty-msg {
      text-align: center;
      color: #aaa;
      font-size: 13px;
      padding: 15px 0;
    }
  </style>
</head>
<body>
  <h3>Blocking by keywords</h3>
  <div class="input-group">
    <input type="text" id="keyword-input" placeholder="Enter keyword..." autocomplete="off">
    <button id="add-btn">Add</button>
  </div>
  <div class="keyword-list" id="keyword-list">
  </div>
  <script src="popup.js"></script>
</body>
</html>
